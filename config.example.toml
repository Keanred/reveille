# reveille configuration
#
# Copy this file to one of the following (first match wins):
#   $REVEILLE_CONFIG
#   $XDG_CONFIG_HOME/reveille/config.toml
#   ~/.config/reveille/config.toml
#
# TOML is human-editable and comments are allowed — annotate freely.

[app]
# Fallback refresh cadence in seconds for sources that don't set their own.
refresh = 30

# Optional global first-paint budget in seconds. Once it elapses, any panel still
# stuck on "loading" (no cache + slow first fetch) is forced to a terminal state so
# the dashboard never hangs half-painted. Cached panels are untouched. Omit for none.
# budget = 3

# Each [[sources]] block becomes a panel on the dashboard.
# `type` selects the source implementation (see src/sources/registry.ts).

[[sources]]
id = "clock"
type = "clock"
title = "Local time"

[[sources]]
id = "hn-top"
type = "http-json"
title = "Hacker News — top stories"
url = "https://hacker-news.firebaseio.com/v0/topstories.json"
refresh = 60

# Current weather from OpenWeather's free 2.5/weather endpoint. The API key is the
# `appid` query param — embed it in `url`, or set `secret` to resolve it from the
# keychain/env and have it appended automatically.
#
# [[sources]]
# id = "weather"
# type = "weather"
# title = "Current Weather"
# url = "https://api.openweathermap.org/data/2.5/weather?lat=62&lon=29.7&units=metric"
# secret = "keychain:openweather"   # keychain/REVEILLE_SECRET_OPENWEATHER -> appended as ?appid=...
# refresh = 600

# Scan a list of local git repos in parallel and show, per repo, dirty/clean,
# ahead/behind vs upstream, and last-commit age. Each repo is scanned concurrently
# with its own `repoTimeout` budget, so one slow/hung repo degrades to an error row
# instead of stalling the panel.
#
# [[sources]]
# id = "repos"
# type = "git"
# title = "Repositories"
# refresh = 30
# repos = ["~/Code/reveille", "~/Code/foo", "~/work/service-a"]  # `~` and env vars expanded
# fetchRemote = false   # true = run `git fetch` first for live ahead/behind (hits the network)
# repoTimeout = 3       # per-repo scan budget in seconds

# Sources may reference a secret by name. It is resolved from the OS keychain
# first (service "reveille"), then from the environment variable
# REVEILLE_SECRET_<NAME> (uppercased, non-alphanumerics -> "_").
#
# [[sources]]
# id = "github"
# type = "http-json"
# title = "GitHub notifications"
# url = "https://api.github.com/notifications"
# refresh = 120
# secret = "github-token"   # -> keychain "github-token" or REVEILLE_SECRET_GITHUB_TOKEN

# --- Sources that feed the summary line (and `reveille --once`) -----------------
# The summary line at the top of the dashboard reads the calendar and todo sources
# below: the countdown to your next event, today's event count, and unchecked todos.

# Today's Google Calendar events plus a live countdown to the next one. Authorize
# once with `reveille login google` — that needs GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET
# (from a Google Cloud OAuth desktop-app client) and stores a refresh token in the
# keychain under "google-refresh". clientId/clientSecret/refreshToken take the same
# secret refs used elsewhere: env:NAME, keychain:NAME, cmd:<command>, or a literal.
#
# [[sources]]
# id = "calendar"
# type = "google-calendar"
# title = "Calendar"
# clientId = "env:GOOGLE_CLIENT_ID"
# clientSecret = "env:GOOGLE_CLIENT_SECRET"
# refreshToken = "keychain:google-refresh"   # default; written by `reveille login google`
# calendarId = "primary"                     # default
# timezone = "Europe/Helsinki"               # optional; defaults to the system zone
# maxEvents = 10                             # optional
# refresh = 300

# A markdown checklist — reads the GFM task items under one heading and surfaces the
# unchecked ones. Only items under `section` (down to the next same-or-higher heading)
# are read, so a backlog further down the file is ignored.
#
# [[sources]]
# id = "todo"
# type = "todo"
# title = "Today"
# path = "~/notes/todo.md"    # `~` and $VARS are expanded
# section = "Today"           # heading to read items under (default)
# refresh = 30
